<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!--
    Anatomical heart body: no internal detail, no vessel protrusions.
    Key shape differences from a valentine heart:
    - Much wider/rounder top (no deep V — atria create a very flat dip)
    - Right side notably fuller and rounder than left
    - Apex pulled hard left (~35% of width)
    - Overall more like an oval than a symmetric heart
  -->
  <path d="
    M 16 10
    C 20 8, 27 9, 27.5 16
    C 28 22, 23 27.5, 17 30.5
    C 14.5 31.5, 11.5 30, 9 27.5
    C 5.5 24, 4.5 19, 5.5 14.5
    C 6.5 10, 10 8, 13 8.5
    C 14.5 9, 15.5 10, 16 10 Z
  " stroke="#8B1A1A" stroke-width="2.2" stroke-linejoin="round"/>
</svg>
