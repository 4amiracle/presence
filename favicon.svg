<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!--
    True outer silhouette of an anatomical heart:
    One continuous path tracing the full contour — from base of descending aorta,
    up and over the aortic arch, down between arch and pulmonary trunk,
    up over the pulmonary trunk, down the right border (right atrium),
    around the apex (lower-left), up the left border, back to start.
  -->
  <path d="
    M 11 12
    C 10 8, 10.5 4, 13 2
    C 15 0.5, 17.5 2, 17 5
    C 17.5 4, 19 3.5, 21 3
    C 23 2.5, 25 4.5, 24 8
    C 27 9, 29 12, 28 17
    C 27 22, 23 27, 18 30
    C 16 31, 13 31, 11.5 30
    C 8 28, 5 24, 5 19
    C 5 13, 8 10, 10 10.5
    C 10.5 11, 11 11.5, 11 12 Z
  " stroke="#8B1A1A" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>
</svg>
